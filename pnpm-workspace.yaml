packages:
  - app/

allowBuilds:
  "@parcel/watcher": true
  es5-ext: true
  unrs-resolver: true

overrides:
  css: npm:@adobe/css-tools@^4.4.3
  postcss: ^8.5.10
  vinyl-fs: ^4.0.2

configDependencies:
  pacquet: "^0.11.10"

enableGlobalVirtualStore: true

minimumReleaseAgeExclude:
  - "@oxfmt/*"
  - "@oxlint/*"
  - oxfmt
  - oxlint

trustPolicy: no-downgrade

trustPolicyExclude:
  # ali-oss, babel, gulp-cli
  - semver@5.7.2 || 6.3.1
  # node types
  - undici-types@6.21.0
